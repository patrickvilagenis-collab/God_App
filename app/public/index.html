<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Compañero espiritual</title>
<style>
  :root {
    --bg1:#1a1438; --bg2:#3b2f6b; --bg3:#6b5bb5;
    --panel:rgba(255,255,255,0.08); --panel-solid:#241c4a;
    --text:#f4f1ff; --muted:#bcb4e0; --accent:#c9b3ff; --accent2:#8f7bd6;
    --me:#5a47a8; --them:rgba(255,255,255,0.10);
  }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color:var(--text);
    background: radial-gradient(circle at 20% 10%, var(--bg3), transparent 45%),
                radial-gradient(circle at 90% 90%, var(--accent2), transparent 40%),
                linear-gradient(160deg, var(--bg1), var(--bg2));
    background-attachment: fixed;
    display:flex; flex-direction:column; height:100dvh;
  }
  .hidden { display:none !important; }

  /* ---------- Entrada / espacio privado ---------- */
  #gate { margin:auto; width:min(440px,92vw); padding:34px 30px;
    background:var(--panel); border:1px solid rgba(255,255,255,0.12);
    border-radius:22px; backdrop-filter:blur(14px); text-align:center; }
  .halo { width:70px;height:70px;margin:0 auto 14px; border-radius:50%;
    background:radial-gradient(circle at 50% 35%, #fff, var(--accent) 55%, var(--accent2));
    box-shadow:0 0 38px var(--accent); }
  h1 { font-size:1.5rem; font-weight:600; margin:.2em 0; }
  .sub { color:var(--muted); font-size:.92rem; margin-bottom:22px; line-height:1.5; }
  label { display:block; text-align:left; font-size:.8rem; color:var(--muted);
    margin:14px 0 6px; }
  input, select {
    width:100%; padding:12px 14px; border-radius:12px; font-size:1rem;
    background:rgba(255,255,255,0.10); border:1px solid rgba(255,255,255,0.18);
    color:var(--text); outline:none; }
  input::placeholder { color:#9c93c4; }
  .trads { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .trad { padding:11px 8px; border-radius:12px; cursor:pointer; font-size:.9rem;
    background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.14);
    transition:.15s; }
  .trad:hover { background:rgba(255,255,255,0.14); }
  .trad.sel { background:var(--accent2); border-color:var(--accent); color:#fff; }
  button.primary { margin-top:22px; width:100%; padding:13px; border:none;
    border-radius:13px; font-size:1.02rem; font-weight:600; cursor:pointer;
    color:#fff; background:linear-gradient(135deg, var(--accent2), var(--me));
    box-shadow:0 6px 20px rgba(90,71,168,.45); }
  button.primary:hover { filter:brightness(1.08); }
  .priv { margin-top:16px; font-size:.74rem; color:var(--muted); }
  .langtoggle { position:absolute; top:16px; right:18px; }
  .langtoggle button { background:var(--panel); border:1px solid rgba(255,255,255,.18);
    color:var(--text); border-radius:20px; padding:6px 12px; cursor:pointer; font-size:.8rem; }

  /* ---------- Chat ---------- */
  #chat { display:flex; flex-direction:column; height:100dvh; width:100%; }
  header.bar { display:flex; align-items:center; gap:12px; padding:12px 16px;
    background:rgba(20,15,45,0.55); backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,.08); }
  .bar .halo { width:34px;height:34px;margin:0; box-shadow:0 0 16px var(--accent); }
  .bar .who { flex:1; }
  .bar .who b { font-size:.98rem; } .bar .who span { display:block; color:var(--muted); font-size:.74rem; }
  .iconbtn { background:rgba(255,255,255,0.10); border:1px solid rgba(255,255,255,.16);
    color:var(--text); width:40px;height:40px;border-radius:50%; cursor:pointer; font-size:1.05rem; }
  .iconbtn.active { background:var(--accent2); border-color:var(--accent); }

  #messages { flex:1; overflow-y:auto; padding:20px 16px; display:flex;
    flex-direction:column; gap:12px; }
  .msg { max-width:80%; padding:11px 15px; border-radius:18px; line-height:1.5;
    font-size:.98rem; white-space:pre-wrap; word-wrap:break-word; animation:rise .25s ease; }
  @keyframes rise { from{opacity:0; transform:translateY(8px);} to{opacity:1;} }
  .msg.them { background:var(--them); border-top-left-radius:5px; align-self:flex-start; }
  .msg.me { background:var(--me); border-top-right-radius:5px; align-self:flex-end; }
  .typing { align-self:flex-start; color:var(--muted); font-style:italic; font-size:.9rem; }

  .composer { display:flex; gap:8px; padding:12px; align-items:flex-end;
    background:rgba(20,15,45,0.55); backdrop-filter:blur(12px);
    border-top:1px solid rgba(255,255,255,.08); }
  .composer textarea { flex:1; resize:none; max-height:120px; padding:12px 14px;
    border-radius:18px; font-family:inherit; font-size:1rem;
    background:rgba(255,255,255,0.10); border:1px solid rgba(255,255,255,.18);
    color:var(--text); outline:none; }
  .send { width:46px;height:46px;border-radius:50%; border:none; cursor:pointer;
    color:#fff; font-size:1.2rem; background:linear-gradient(135deg,var(--accent2),var(--me)); }
  .send:disabled { opacity:.5; cursor:default; }
</style>
</head>
<body>

<!-- ====== Espacio privado: entrada ====== -->
<div id="gate">
  <div class="halo"></div>
  <h1 data-i18n="title">Tu espacio privado</h1>
  <p class="sub" data-i18n="sub">Un lugar tranquilo y confidencial para ser escuchado/a,
    sin juicios, estés donde estés en tu camino.</p>

  <label data-i18n="nameLbl">¿Cómo te llamas? (opcional)</label>
  <input id="name" placeholder="..." />

  <label data-i18n="tradLbl">¿Con qué tradición te identificas?</label>
  <div class="trads" id="trads">
    <div class="trad" data-t="christian" data-es="Cristianismo" data-en="Christianity">Cristianismo</div>
    <div class="trad" data-t="muslim" data-es="Islam" data-en="Islam">Islam</div>
    <div class="trad" data-t="jewish" data-es="Judaísmo" data-en="Judaism">Judaísmo</div>
    <div class="trad" data-t="buddhist" data-es="Budismo" data-en="Buddhism">Budismo</div>
    <div class="trad sel" data-t="exploring" data-es="En búsqueda" data-en="Exploring" style="grid-column:1/3">En búsqueda</div>
  </div>

  <button class="primary" id="enter" data-i18n="enter">Entrar a mi espacio</button>
  <p class="priv" data-i18n="priv">🔒 Tus conversaciones son privadas y personales.</p>
</div>

<div class="langtoggle"><button id="lang">EN</button></div>

<!-- ====== Chat ====== -->
<div id="chat" class="hidden">
  <header class="bar">
    <div class="halo"></div>
    <div class="who"><b data-i18n="companion">Compañero espiritual</b><span id="ctx"></span></div>
    <button class="iconbtn" id="voiceBtn" title="Voz" >🔊</button>
    <button class="iconbtn" id="exit" title="Salir">⤺</button>
  </header>
  <div id="messages"></div>
  <div class="composer">
    <button class="iconbtn" id="mic" title="Hablar">🎙️</button>
    <textarea id="input" rows="1" data-i18n-ph="ph" placeholder="Escribe lo que llevas en el corazón..."></textarea>
    <button class="send" id="send">➤</button>
  </div>
</div>

<script>
const I18N = {
  es: { title:"Tu espacio privado",
        sub:"Un lugar tranquilo y confidencial para ser escuchado/a, sin juicios, estés donde estés en tu camino.",
        nameLbl:"¿Cómo te llamas? (opcional)", tradLbl:"¿Con qué tradición te identificas?",
        enter:"Entrar a mi espacio", priv:"🔒 Tus conversaciones son privadas y personales.",
        companion:"Compañero espiritual", ph:"Escribe lo que llevas en el corazón...",
        greet:(n)=>`La paz sea contigo${n?", "+n:""}. Estoy aquí, contigo. ¿Qué llevas en el corazón hoy?`,
        thinking:"escuchándote...", err:"Algo falló al conectar. Inténtalo de nuevo.", langBtn:"EN" },
  en: { title:"Your private space",
        sub:"A calm, confidential place to be heard — without judgment, wherever you are on your journey.",
        nameLbl:"What's your name? (optional)", tradLbl:"Which tradition do you identify with?",
        enter:"Enter my space", priv:"🔒 Your conversations are private and personal.",
        companion:"Spiritual companion", ph:"Write what's on your heart...",
        greet:(n)=>`Peace be with you${n?", "+n:""}. I'm here, with you. What's on your heart today?`,
        thinking:"listening...", err:"Something went wrong connecting. Please try again.", langBtn:"ES" },
};

let lang = "es", tradition = "exploring", userName = "";
let history = [];  // {role, content}

const $ = (id)=>document.getElementById(id);

function applyLang(){
  document.documentElement.lang = lang;
  const t = I18N[lang];
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t[el.dataset.i18n] || el.textContent; });
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>{ el.placeholder = t[el.dataset.i18nPh] || el.placeholder; });
  document.querySelectorAll(".trad").forEach(el=>{ el.textContent = el.dataset[lang]; });
  $("lang").textContent = t.langBtn;
}
$("lang").onclick = ()=>{ lang = lang==="es"?"en":"es"; applyLang(); };

// selección de tradición
$("trads").addEventListener("click", e=>{
  const el = e.target.closest(".trad"); if(!el) return;
  document.querySelectorAll(".trad").forEach(x=>x.classList.remove("sel"));
  el.classList.add("sel"); tradition = el.dataset.t;
});

// voz (lectura en voz alta)
let voiceOn = false;
$("voiceBtn").onclick = ()=>{ voiceOn = !voiceOn; $("voiceBtn").classList.toggle("active", voiceOn);
  if(!voiceOn && window.speechSynthesis) speechSynthesis.cancel(); };
function speak(text){
  if(!voiceOn || !window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang==="es" ? "es-ES" : "en-US"; u.rate = .92; u.pitch = 1;
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}

// entrada por voz (dictado)
let rec = null;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SR){
  $("mic").onclick = ()=>{
    rec = new SR(); rec.lang = lang==="es"?"es-ES":"en-US"; rec.interimResults=false;
    $("mic").classList.add("active");
    rec.onresult = (e)=>{ $("input").value += (e.results[0][0].transcript); autoGrow(); };
    rec.onend = ()=> $("mic").classList.remove("active");
    rec.start();
  };
} else { $("mic").style.display="none"; }

// entrar al chat
$("enter").onclick = ()=>{
  userName = $("name").value.trim();
  $("gate").classList.add("hidden");
  $("chat").classList.remove("hidden");
  const tradLabel = document.querySelector(`.trad[data-t="${tradition}"]`).dataset[lang];
  $("ctx").textContent = (userName? userName+" · ":"") + tradLabel;
  addMsg("them", I18N[lang].greet(userName));
};
$("exit").onclick = ()=>{ if(window.speechSynthesis) speechSynthesis.cancel();
  $("chat").classList.add("hidden"); $("gate").classList.remove("hidden"); history=[]; $("messages").innerHTML=""; };

function addMsg(who, text){
  const d = document.createElement("div");
  d.className = "msg "+who; d.textContent = text;
  $("messages").appendChild(d); $("messages").scrollTop = 1e9;
  return d;
}

const input = $("input");
function autoGrow(){ input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,120)+"px"; }
input.addEventListener("input", autoGrow);
input.addEventListener("keydown", e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendMsg(); }});
$("send").onclick = sendMsg;

async function sendMsg(){
  const text = input.value.trim(); if(!text) return;
  input.value=""; autoGrow();
  addMsg("me", text);
  history.push({role:"user", content:text});

  const typing = document.createElement("div");
  typing.className="typing"; typing.textContent = I18N[lang].thinking;
  $("messages").appendChild(typing); $("messages").scrollTop=1e9;
  $("send").disabled = true;

  try{
    const r = await fetch("/api/chat", {method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({messages:history, tradition, language:lang, name:userName})});
    const data = await r.json();
    typing.remove();
    if(data.error){ addMsg("them", I18N[lang].err); console.error(data.error); }
    else { addMsg("them", data.reply); history.push({role:"assistant", content:data.reply}); speak(data.reply); }
  }catch(err){ typing.remove(); addMsg("them", I18N[lang].err); console.error(err); }
  finally{ $("send").disabled=false; input.focus(); }
}

applyLang();
</script>
</body>
</html>
